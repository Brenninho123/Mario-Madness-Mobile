name: Build Android
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          for lib in flixel flixel-addons flixel-ui lime openfl; do haxelib install $lib --quiet; done
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          haxelib git linc_luajit https://github.com/neoneurowe/linc_luajit.git
          haxelib git extension-androidtools https://github.com/MAJESTY-Development/extension-androidtools.git

      - name: Configure Android
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK $ANDROID_HOME/ndk-bundle
          haxelib run lime config JAVA_HOME $JAVA_HOME

      - name: Build APK
        run: haxelib run lime build android -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarioMadness-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
