name: Build Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  HAXE_VERSION: 4.2.5

jobs:
  android:
    name: Android
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: ~/haxelib
          key: haxelib-${{ env.HAXE_VERSION }}-${{ hashFiles('**/Project.xml') }}
          restore-keys: haxelib-${{ env.HAXE_VERSION }}-

      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-android-${{ hashFiles('**/Project.xml') }}
          restore-keys: hxcpp-android-

      - name: Install Libraries
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp                --quiet
          haxelib install lime           8.0.2 --quiet
          haxelib install openfl         9.3.3 --quiet
          haxelib install flixel         5.5.0 --quiet
          haxelib install flixel-addons  3.2.1 --quiet
          haxelib install flixel-ui      2.5.0 --quiet
          haxelib install hscript              --quiet
          haxelib git linc_luajit            https://github.com/AlafandyPorting/linc_luajit-0.7.3.git       --quiet
          haxelib git extension-androidtools https://github.com/AlafandyPorting/extension-androidtools.git --quiet

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build android -release -nosign

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MarioMadness-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14