name: Build Android
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Libs
        run: |
          haxelib setup ~/haxelib
          for lib in lime:8.0.2 openfl:9.3.3 flixel:5.5.0 flixel-addons:3.2.1 flixel-ui:2.5.0; do haxelib install ${lib%:* $(echo $lib | cut -d: -f2)} --quiet; done
          haxelib git hxcpp https://github.com/HaxeFoundation/hxcpp.git
          haxelib git linc_luajit https://github.com/AlafandyPorting/linc_luajit-0.7.3.git
          haxelib git extension-androidtools https://github.com/AlafandyPorting/extension-androidtools.git

      - name: Config & Build
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK $ANDROID_HOME/ndk-bundle
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime build android -release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MarioMadness-Android
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk
